fail_fast: false
default_stages: [pre-commit, pre-push]

repos:
  # Disabled meta hooks due to nix environment compatibility issues
  #  - repo: meta
  #    hooks:
  #      - id: identity
  #        exclude: ^/nix/store/
  #      - id: check-useless-excludes
  #        exclude: ^/nix/store/

  - repo: local
    hooks:
      - id: check-toml
        name: check toml
        entry: check-toml
        language: system
        types: [toml]

      - id: end-of-file-fixer
        name: fix end of files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]

      # 定义的hook脚本，在repo的.pre-commit-hooks.yaml中定义
      - id: check-added-large-files
        name: check for added large files
        entry: check-added-large-files
        language: system
        stages: [pre-commit, pre-push, manual]
        args: ["--maxkb=1024", "--enforce-all"]

      - id: check-added-large-files
        name: check for added large files
        entry: check-added-large-files
        language: system
        stages: [pre-commit, pre-push, manual]
        args: ["--maxkb=5120", "--enforce-all"]

      - id: trailing-whitespace # 移除尾部空格符
        name: trim trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]

      - id: check-merge-conflict # 检查是否含有合并冲突符号
        name: check for merge conflicts
        entry: check-merge-conflict
        language: system
        types: [text]

      - id: check-json
        name: check json
        entry: check-json
        language: system
        types: [json]

      - id: check-symlinks
        name: check for broken symlinks
        entry: check-symlinks
        language: system
        types: [symlink]

      - id: mixed-line-ending
        name: mixed line ending
        entry: mixed-line-ending
        language: system
        types: [text]

      - id: check-case-conflict
        name: check for case conflicts
        entry: check-case-conflict
        language: system

      - id: check-executables-have-shebangs
        name: check that executables have shebangs
        entry: check-executables-have-shebangs
        language: system
        types: [text, executable]
        stages: [pre-commit, pre-push, manual]

      - id: check-shebang-scripts-are-executable
        name: check that scripts with shebangs are executable
        entry: check-shebang-scripts-are-executable
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]

      - id: detect-private-key
        name: detect private key
        entry: detect-private-key
        language: system
        types: [text]

      - id: destroyed-symlinks
        name: detect destroyed symlinks
        entry: destroyed-symlinks
        language: system
        types: [file]
        stages: [pre-commit, pre-push, manual]

  - repo: local
    hooks:
      - id: gitlint
        name: Git Commit Message Linter
        entry: gitlint
        args: [--staged, --msg-filename]
        language: system
        stages: [commit-msg]

      - id: gitlint-ci
        name: gitlint ci
        entry: gitlint
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]

  - repo: local
    hooks:
      - id: commitizen
        name: commitizen check
        entry: cz check
        args: [--allow-abort, --commit-msg-file]
        language: system
        stages: [commit-msg]

      - id: commitizen-branch
        name: commitizen check branch
        entry: cz check
        args: [--rev-range, '$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF']
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflow files
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/

  # Tags(description): 代码质量 > Shell静态检查 > Lint
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]

  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

  - repo: local
    hooks:
      - id: gitleaks
        name: Scan Secrets
        entry: gitleaks detect --source . -v
        language: system
        pass_filenames: false
        stages: [pre-commit]


  - repo: local
    hooks:
      - id: terraform_fmt
        name: Terraform fmt
        entry: tofu fmt -diff
        language: system
        files: \.(tf|tofu|tfvars|(tftest|tofutest|tfmock|tfquery)\.hcl)$
        exclude: \.terraform/.*$

  #  - repo: local
  #    hooks:
  #      - id: dashboard-linter
  #        name: dashboard-linter
  #        entry: leeway run components/dashboard:lint
  #        language: system
  #        pass_filenames: false
  #        files: ^components/dashboard/

  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles
        entry: hadolint
        language: system
        types: [dockerfile]


  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: system
        types: [text]
        files: ^\.tms/
        exclude: \.md$ # 禁止 prettier 格式化MD文件



  # Disabled Go candidates: the repo currently has no tracked go.mod or *.go.
  #- url: https://github.com/uber-go/goleak
  #  des: Used to detect goroutine leaks
  #- url: https://github.com/uber-go/nilaway
  #  des: 用来在编译时捕获nil，来规避生产环境出现nil panic问题。确实非常实用，帮我避免了很多坑。
  #- url: https://github.com/dkorunic/betteralign
  #  des: 相比于fieldalignment，不会去修改各种 xxx_gen.go 以及 xxx_test.go 代码
  #- url: https://github.com/mvdan/gofumpt
  #- url: https://github.com/daixiang0/gci
  #  des: GCI, a tool that control golang package import order and make it always deterministic.
  #- url: https://github.com/mgechev/revive
  - repo: local
    hooks:
      - id: treefmt
        name: treefmt
        description: Format files through treefmt
        entry: treefmt --config-file .github/linters/treefmt.toml
        language: system
        require_serial: true
        files: \.(nix|tf|tfvars|tftest\.hcl|tm\.hcl|toml|kdl|sh|bash|envrc|lua)$

      - id: betteralign
        name: betteralign
        types: [go]
        language: golang
        entry: betteralign -apply ./...

      - id: go-test
        name: go-test
        types: [go]
        language: golang
        entry: go test `go list ./... | grep -v examples` -coverprofile=coverage.out -covermode=atomic

      - id: nilaway
        name: nilaway
        types: [go]
        language: golang
        entry: nilaway ./...

      - id: statix-fix
        name: Statix Fix
        description: Fix files with statix
        entry: statix
        args: ["fix", "--ignore", "pkgs/_sources/**", "."]
        types: [nix]
        pass_filenames: false
        language: system

      - id: statix-check
        name: Statix Check
        description: Check files for improvements with statix
        entry: statix
        args: ["check", "--ignore", "pkgs/_sources/**", "."]
        types: [nix]
        pass_filenames: false
        language: system

      # caddy 本身不会“自动扫描仓库里的 Caddyfile”，validate / caddy fmt 都是一次处理一个 config 路径（--config  <file>），所以这里只能写死path
      - id: caddy-fmt
        name: caddy-fmt
        language: system
        pass_filenames: false
        entry: caddy fmt --diff .cntr/caddy/Caddyfile --overwrite

      - id: caddy-adapt
        name: caddy-adapt
        language: system
        pass_filenames: false
        # pre-commit 只做静态语法/结构检查（Caddyfile → JSON）。
        # 完整 `caddy validate` 会跑模块 Provision()，对 basic_auth 等需要 runtime secret
        # 的指令会因 env 为空报错。runtime 校验留给真实 compose/CI 环境。
        entry: caddy adapt --config .cntr/caddy/Caddyfile

      - id: markdownlint
        name: Lint Markdown files
        alias: md
        entry: markdownlint -c .github/linters/markdownlint.yml
        types: [markdown]
        language: system
        files: ^blog/

      - id: yamllint
        name: Lint YAML files
        entry: yamllint -c .github/linters/yamllint.yml
        exclude: (^|/)(node_modules|\.pnpm|\.tms/node_modules|\.tms/\.e2e|\.e2e)/|.*pnpm-lock\.yaml$
        types: [yaml]
        language: system

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --fix -c .github/linters/golangci-lint.yml
        types: [go]
        language: system

      - id: stylelint
        name: stylelint
        entry: stylelint --config .github/linters/stylelint.config.cjs
        files: \.(css|scss|sass)$
        language: system

  - repo: local
    hooks:
      - id: deadnix
        name: deadnix
        entry: deadnix
        language: system
        types: [nix]
        args: [--edit]
        exclude: pkgs/_sources/ # 这个文件不应该修改
