  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        alias: md
        name: Lint Markdown files
        entry: markdownlint -f -c .github/linters/markdownlint.yml -i node_modules
        types: [markdown]
        language: node
        files: ^blog/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: Lint YAML files
        entry: yamllint -c .github/linters/yamllint.yml
        exclude: (^|/)(node_modules|\\.pnpm|\\.tms/node_modules|\\.tms/\\.e2e|\\.e2e)/|.*pnpm-lock\\.yaml$
        types: [yaml]
        language: python


  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        types: [python]
      - id: ruff-format
        types: [python]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: Scan Secrets
        entry: gitleaks detect --source . -v && gitleaks dir . -v


  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args:
          - --args=-diff

  #  - repo: local
  #    hooks:
  #      - id: dashboard-linter
  #        name: dashboard-linter
  #        entry: leeway run components/dashboard:lint
  #        language: system
  #        pass_filenames: false
  #        files: ^components/dashboard/

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint


  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-config-verify
        args: ["-c", ".github/linters/golangci-lint.yml"]
      - id: golangci-lint
        entry: golangci-lint run --fix -c .github/linters/golangci-lint.yml
        types: [go]
        language: golang
      - id: golangci-lint-full
        args: ["-c", ".github/linters/golangci-lint.yml"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^\.tms/
        exclude: \.md$ # 禁止 prettier 格式化MD文件



  #- url: https://github.com/uber-go/goleak
  #  des: Used to detect goroutine leaks
  #- url: https://github.com/uber-go/nilaway
  #  des: 用来在编译时捕获nil，来规避生产环境出现nil panic问题。确实非常实用，帮我避免了很多坑。
  #- url: https://github.com/dkorunic/betteralign
  #  des: 相比于fieldalignment，不会去修改各种 xxx_gen.go 以及 xxx_test.go 代码
  #- url: https://github.com/mvdan/gofumpt
  #- url: https://github.com/daixiang0/gci
  #  des: GCI, a tool that control golang package import order and make it always deterministic.
  #- url: https://github.com/mgechev/revive
  #  des: golangci-lint已经内置了
  #  - repo: https://github.com/lietu/go-pre-commit
  #    rev: v0.1.0
  #    hooks:
  #      - id: errcheck
  #      - id: go-fmt-goimports
  #      - id: go-test
  #      - id: go-vet
  #        entry: go vet -vettool=$(which shadow) -strict
  #      - id: gofumpt
  #        entry: gofumpt -l -w .
  #      - id: golangci-lint
  #      - id: golint
  #      - id: staticcheck
  #      - id: go-mod-tidy

  - repo: local
    hooks:
      - id: betteralign
        name: betteralign
        types: [go]
        language: golang
        entry: betteralign -apply ./...

      - id: go-test
        name: go-test
        types: [go]
        language: golang
        entry: go test `go list ./... | grep -v examples` -coverprofile=coverage.out -covermode=atomic

      - id: nilaway
        name: nilaway
        types: [go]
        language: golang
        entry: nilaway ./...

      - id: statix-fix
        name: Statix Fix
        description: Fix files with statix
        entry: statix fix ./nix
        types: [nix]
        pass_filenames: false
        language: system

      - id: statix-check
        name: Statix Check
        description: Check files for improvements with statix
        entry: statix check ./nix
        types: [nix]
        pass_filenames: false
        language: system

      # caddy 本身不会“自动扫描仓库里的 Caddyfile”，validate / caddy fmt 都是一次处理一个 config 路径（--config  <file>），所以这里只能写死path
      - id: caddy-fmt
        name: caddy-fmt
        language: system
        pass_filenames: false
        entry: caddy fmt --diff .cntr/caddy/Caddyfile --overwrite

      - id: caddy-adapt
        name: caddy-adapt
        language: system
        pass_filenames: false
        # pre-commit 只做静态语法/结构检查（Caddyfile → JSON）。
        # 完整 `caddy validate` 会跑模块 Provision()，对 basic_auth 等需要 runtime secret
        # 的指令会因 env 为空报错。runtime 校验留给真实 compose/CI 环境。
        entry: caddy adapt --config .cntr/caddy/Caddyfile


  - repo: https://github.com/astro/deadnix
    rev: v1.3.1
    hooks:
      - id: deadnix
        args: [--edit]
        exclude: pkgs/_sources/ # 这个文件不应该修改


  - repo: https://github.com/kamadorueda/alejandra
    rev: 4.0.0
    hooks:
      # Requires Nix to be previously installed in the system
      # - id: alejandra-nix
      # Requires Alejandra to be previously installed in the system
      - id: alejandra-system


  - repo: https://github.com/hougesen/kdlfmt
    rev: v0.1.6
    hooks:
      - id: kdlfmt-format

  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v17.11.0
    hooks:
      - id: stylelint
        args: ["--config", ".github/linters/stylelint.config.cjs"]
