  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

  - repo: local
    hooks:
      - id: gitleaks
        name: Scan Secrets
        entry: gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        stages: [pre-commit]


  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args:
          - --hook-config=--tf-path=tofu
          - --args=-diff

  #  - repo: local
  #    hooks:
  #      - id: dashboard-linter
  #        name: dashboard-linter
  #        entry: leeway run components/dashboard:lint
  #        language: system
  #        pass_filenames: false
  #        files: ^components/dashboard/

  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles
        entry: hadolint
        language: system
        types: [dockerfile]


  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: system
        types: [text]
        files: ^\.tms/
        exclude: \.md$ # 禁止 prettier 格式化MD文件



