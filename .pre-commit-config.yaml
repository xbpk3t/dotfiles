fail_fast: false
default_stages: [pre-commit, pre-push]

repos:
  # Disabled meta hooks due to nix environment compatibility issues
  #  - repo: meta
  #    hooks:
  #      - id: identity
  #        exclude: ^/nix/store/
  #      - id: check-useless-excludes
  #        exclude: ^/nix/store/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: end-of-file-fixer

      # 定义的hook脚本，在repo的.pre-commit-hooks.yaml中定义
      - id: check-added-large-files
        args: ["--maxkb=1024", "--enforce-all"]

      - id: check-added-large-files
        args: ["--maxkb=5120", "--enforce-all"]

      - id: trailing-whitespace # 移除尾部空格符
      - id: check-merge-conflict # 检查是否含有合并冲突符号
      - id: check-json
      - id: check-symlinks
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
      - id: check-pre-commit-ci-config

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        name: Git Commit Message Linter
        entry: gitlint
        types: [gitlint]
        language: python
      - id: gitlint-ci

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

#  - repo: https://github.com/shellcheck-py/shellcheck-py
#    rev: v0.10.0.1
#    hooks:
#      - id: shellcheck
#        types: [shell]
#

# 报错 Cannot find package '@typescript-eslint/parser' 需要本地安装
