fail_fast: false
default_stages: [pre-commit, pre-push]

repos:
  # Disabled meta hooks due to nix environment compatibility issues
  #  - repo: meta
  #    hooks:
  #      - id: identity
  #        exclude: ^/nix/store/
  #      - id: check-useless-excludes
  #        exclude: ^/nix/store/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: end-of-file-fixer

      # 定义的hook脚本，在repo的.pre-commit-hooks.yaml中定义
      - id: check-added-large-files
        args: ["--maxkb=1024", "--enforce-all"]

      - id: check-added-large-files
        args: ["--maxkb=5120", "--enforce-all"]

      - id: trailing-whitespace # 移除尾部空格符
      - id: check-merge-conflict # 检查是否含有合并冲突符号
      - id: check-json
      - id: check-symlinks
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Remote exception: nixpkgs has no direct pre-commit-ci-config package.
  - repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
      - id: check-pre-commit-ci-config

  - repo: local
    hooks:
      - id: gitlint
        name: Git Commit Message Linter
        entry: gitlint
        args: [--staged, --msg-filename]
        language: system
        stages: [commit-msg]

      - id: gitlint-ci
        name: gitlint ci
        entry: gitlint
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]

  - repo: local
    hooks:
      - id: commitizen
        name: commitizen check
        entry: cz check
        args: [--allow-abort, --commit-msg-file]
        language: system
        stages: [commit-msg]

      - id: commitizen-branch
        name: commitizen check branch
        entry: cz check
        args: [--rev-range, '$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF']
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflow files
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/

# Disabled: local shellcheck is installed via Nix; keep this as a candidate only.
#  - repo: https://github.com/shellcheck-py/shellcheck-py
#    rev: v0.10.0.1
#    hooks:
#      - id: shellcheck
#        types: [shell]
