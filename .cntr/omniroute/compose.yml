---
# OmniRoute — Free AI Gateway (base profile)
# https://github.com/diegosouzapw/OmniRoute

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: omniroute-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    ports:
      - "127.0.0.1:20128:20128"
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
    #      - edge
    mem_limit: 1g
    memswap_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  edge:
    name: edge
    external: true

volumes:
  redis-data:
