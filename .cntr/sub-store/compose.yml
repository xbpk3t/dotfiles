---
# 历史选型背景参考下述文档（已删除 subconverter/subweb，统一用 Sub-Store 完成转换 + 聚合）：
# - https://github.com/sub-store-org/Sub-Store
# - https://zelikk.blogspot.com/2025/05/docker-sub-store-http-meta-gist.html
# - https://linux.do/t/topic/660141  懒人配置
#
# 部署模式：
#   统一部署在 nixos-vps-dev，监听 tailscale IP（TAILSCALE_IPV4），仅内网可达。
#   不走 Caddy 公网反代，admin path 使用固定 /admin（tailscale 网络层提供安全边界）。
# 密钥模式参考 .cntr/axonhub/compose.yml:15 的 ${DEFAULT_SK}：
#   本地开发：手动 export DEFAULT_SK=<your-sk> 后启动
#   生产：走 sops + sessionVariables 注入（见 nixos-vps 配置）

name: sub-store

services:
  sub-store:
    image: xream/sub-store:latest
    restart: unless-stopped
    # 监听 TAILSCALE_IPV4:3001，仅 tailnet 内可达
    ports:
      - "${TAILSCALE_IPV4:?TAILSCALE_IPV4 is required}:3001:3001"
#      - "127.0.0.1:3001:3001"
    environment:
      # admin 入口路径（tailscale 内网，无需随机化）
      SUB_STORE_FRONTEND_BACKEND_PATH: /admin
      # 前后端合并为单一端口，MERGE 默认走 backend API port，需显式指定为 3001
      SUB_STORE_BACKEND_MERGE: "true"
      SUB_STORE_BACKEND_API_PORT: "3001"
      # 每 4 小时自动同步订阅
      SUB_STORE_BACKEND_SYNC_CRON: "17 */4 * * *"
      # Gist 备份（复用 shell 环境中的 GITHUB_TOKEN，需 gist scope）
      SUB_STORE_BACKEND_UPLOAD_GIST_TOKEN: ${GITHUB_TOKEN:-}
      SUB_STORE_BACKEND_UPLOAD_CRON: "17 4 * * *"
      # 启动时从远程 URL 恢复数据（Gist raw + #noCache）
      SUB_STORE_DATA_URL: ${SUB_STORE_DATA_URL:-}
      # 推送通知（Bark/Telegram/ServerChan）
      # SUB_STORE_PUSH_SERVICE: ${SUB_STORE_PUSH_SERVICE:-}
    volumes:
      - ./data:/opt/app/data
      - ./scripts:/opt/app/data/scripts
    networks:
      - default
      - edge
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      # 探活管理端前端路径而非 root，验证 Express 路由完整可用
      # $$ 转义使 docker compose 不展开变量，由容器内 shell 展开 SUB_STORE_FRONTEND_BACKEND_PATH
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3001$${SUB_STORE_FRONTEND_BACKEND_PATH} 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  edge:
    name: edge
    # 本地 false：compose 自动创建（仅服务于本 compose）
    # VPS true：使用 Caddy compose 外部创建的 edge
    # 参考 .cntr/axonhub/compose.yml:130-136
    external: ${EDGE_NETWORK_EXTERNAL:-false}
