---

name: golang

x-common-env: &common-env
  TZ: ${TZ:-Asia/Shanghai}

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-service: &common-service
  restart: "no"
  networks:
    - backend
  logging: *common-logging

services:
  mysql:
    <<: *common-service
    profiles: ["db", "mysql"]
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: golang-mysql
    environment:
      <<: *common-env
      MYSQL_USER: ${MYSQL_USERNAME:-devuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-devdb}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    <<: *common-service
    profiles: ["db", "postgres"]
    image: postgres:${PGSQL_VERSION:-16-alpine}
    container_name: golang-postgres
    environment:
      <<: *common-env
      POSTGRES_USER: ${PGSQL_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      POSTGRES_DB: ${PGSQL_DATABASE:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PGSQL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    <<: *common-service
    profiles: ["cache", "redis"]
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: golang-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    <<: *common-service
    profiles: ["ms", "dtm", "etcd"]
    image: bitnami/etcd:${ETCD_VERSION:-3.5}
    container_name: golang-etcd
    environment:
      <<: *common-env
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    volumes:
      - etcd_data:/bitnami/etcd
    ports:
      - "${ETCD_PORT:-2379}:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    <<: *common-service
    profiles: ["trace", "jaeger"]
    image: jaegertracing/all-in-one:${JAEGER_VERSION:-1.57}
    container_name: golang-jaeger
    environment:
      <<: *common-env
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"

  dtm:
    <<: *common-service
    profiles: ["ms", "dtm"]
    image: yedf/dtm:${DTM_VERSION:-latest}
    container_name: golang-dtm
    entrypoint:
      - /app/dtm/dtm
      - -c=/app/dtm/configs/config.yaml
    volumes:
      - ./dtm/config.yml:/app/dtm/configs/config.yaml:ro
    ports:
      - "${DTM_HTTP_PORT:-36789}:36789"
      - "${DTM_GRPC_PORT:-36790}:36790"
    depends_on:
      etcd:
        condition: service_healthy

  clickhouse:
    <<: *common-service
    profiles: ["analytics", "clickhouse"]
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.8}
    container_name: golang-clickhouse
    environment:
      <<: *common-env
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backend:
    name: golang_backend
    driver: ${NETWORKS_DRIVER:-bridge}

volumes:
  mysql_data:
    name: golang_mysql_data
  postgres_data:
    name: golang_postgres_data
  redis_data:
    name: golang_redis_data
  etcd_data:
    name: golang_etcd_data
  clickhouse_data:
    name: golang_clickhouse_data
  clickhouse_logs:
    name: golang_clickhouse_logs
