---
# https://github.com/getwud/wud
#
# WUD — What's Up Docker: 监听运行中的容器镜像更新并通知。
# 纯通知模式（不自动 pull / restart），替代已 EOL 的 Watchtower。
#
# 依赖 host shell 环境中的 DOCKER_HUB_TOKEN 变量（经由 sops +
# home.sessionVariables 注入），不依赖 .env 文件。

name: wud

services:
  wud:
    image: ghcr.io/getwud/wud:latest
    container_name: wud
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: Asia/Shanghai

      # --- 核心行为 ---
      WUD_UI_ENABLED: "false"                  # Headless，不开 Web UI
      WUD_WATCHER_INTERVAL: 300s               # 每 5 分钟扫一次
      WUD_WATCHER_DOCKER_WATCHALL: "true"      # 监控所有容器

      # --- Docker Hub 认证（防匿名限流: 100 → 200 req/6h）---
      WUD_REGISTRY_DOCKERHUB_USERNAME: luckyhacking
      WUD_REGISTRY_DOCKERHUB_PASSWORD: ${DOCKER_HUB_TOKEN}

      # --- 通知: Console（保底日志）---
      WUD_NOTIFICATION_CONSOLE_ENABLED: "true"

      # --- SMTP → Resend ---
      # WUD 无原生 Resend provider，通过 SMTP 连 Resend 网关发邮件。
      # RESEND_TOKEN 由 sops 注入 host sessionVariables。
      # FROM 首次可用 onboarding@resend.dev（Resend 默认测试发件地址），
      # 后续可换为已验证域名下的邮箱。
      WUD_TRIGGER_SMTP_RESEND_HOST: smtp.resend.com
      WUD_TRIGGER_SMTP_RESEND_PORT: 587
      WUD_TRIGGER_SMTP_RESEND_USER: resend
      WUD_TRIGGER_SMTP_RESEND_PASS: ${RESEND_TOKEN}
      WUD_TRIGGER_SMTP_RESEND_FROM_ADDRESS: onboarding@resend.dev
      WUD_TRIGGER_SMTP_RESEND_TO: jeffcottlu@gmail.com
