---


services:
  axonhub:
    image: looplj/axonhub:latest
    expose:
      - "8090"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - axonhub_data:/app/data
    environment:
      AXONHUB_SERVER_PORT: 8090
      AXONHUB_DB_DIALECT: postgres
      AXONHUB_DB_DSN: "postgres://axonhub:${DEFAULT_SK}@postgres:5432/axonhub?sslmode=disable"
      AXONHUB_LOG_LEVEL: warn
      AXONHUB_LOG_OUTPUT: console
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - edge
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    # [2026-05-11] 尝试迁移到 18-alpine 未果，麻烦事太多，潜在收益也不大，所以不再处理
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: axonhub
      POSTGRES_USER: axonhub
      POSTGRES_PASSWORD: ${DEFAULT_SK}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axonhub -d axonhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"


