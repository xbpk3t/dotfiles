---


services:
  axonhub:
    image: looplj/axonhub:latest
    expose:
      - "8090"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - axonhub_data:/app/data
    environment:
      - AXONHUB_SERVER_PORT=8090
      - AXONHUB_DB_DIALECT=postgres
      - AXONHUB_DB_DSN=postgres://axonhub:${DB_PWD}@postgres:5432/axonhub?sslmode=disable
      - AXONHUB_LOG_LEVEL=warn
      - AXONHUB_LOG_OUTPUT=console
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - edge
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=axonhub
      - POSTGRES_USER=axonhub
      - POSTGRES_PASSWORD=${DB_PWD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axonhub -d axonhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  edge:
    name: edge
    external: true

volumes:
  axonhub_data:
  postgres_data:
