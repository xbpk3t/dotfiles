---
# ℹ️ 用途：AxonHub 是主 LLM 网关，统一所有 client 的路由入口。
#   client → api.lucc.dev/v1 → Caddy → AxonHub → 各个 upstream provider
#
# 同文件包含：9router sidecar（仅用于 ds4f 的 proxy pool 路由转发）。
#   架构：AxonHub → http://9router:20128/v1 → 9router → proxy pool → OpenCode Zen
#   分离理由：只有 ds4f 走 proxy pool，其他 model 直连不走 9router。
#   9router 不暴露公网（127.0.0.1:20228），Dashboard 通过 SSH tunnel 访问。
#   Docker 内部 DNS 解析 9router 主机名，无需 TAILSCALE_IP / edge network。

services:
  axonhub:
    image: looplj/axonhub:latest
    container_name: axonhub
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - axonhub_data:/app/data
    environment:
      AXONHUB_SERVER_PORT: 8090
      AXONHUB_DB_DIALECT: postgres
      AXONHUB_DB_DSN: "postgres://axonhub:${DEFAULT_SK}@postgres:5432/axonhub?sslmode=disable"
      AXONHUB_LOG_LEVEL: warn
      AXONHUB_LOG_OUTPUT: console
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - edge
    restart: unless-stopped
    # Why: AxonHub panel Backup / request-log paths have already pushed this VPS
    # into global OOM; the AxonHub container peaked around 4.4G RAM plus 3.3G
    # swap, then the kernel killed host-critical services such as dockerd,
    # nix-daemon, and caddy.
    # What: cap only the AxonHub container so a future leak or oversized backup
    # fails inside this service and restarts via Docker instead of taking down
    # the whole VPS. Set memswap_limit equal to mem_limit to avoid hiding the
    # leak behind swap and exhausting host memory pressure later.
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    # [2026-05-11] 尝试迁移到 18-alpine 未果，麻烦事太多，潜在收益也不大，所以不再处理
    image: postgres:15-alpine
    container_name: axonhub-pgsql
    environment:
      POSTGRES_DB: axonhub
      POSTGRES_USER: axonhub
      POSTGRES_PASSWORD: ${DEFAULT_SK}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axonhub -d axonhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"


  # 9router sidecar — 仅为 ds4f 提供 proxy pool 转发能力
  #
  # 架构：AxonHub → http://9router:20128/v1 → 9router → proxy pool → OpenCode Zen
  # 网络：只绑 127.0.0.1，仅用于 SSH tunnel 后本机调 Dashboard 配 proxy pool。
  #       9router 和 AxonHub 在同一个 Docker internal network 内，直接 DNS 解析。
  #
  # Dashboard 访问：
  #   ssh -L 20228:localhost:20228 nixos-vps-dev
  #   然后浏览器打开 http://localhost:20228
  #
  # 使用方法：
  #   1. 浏览器连 Dashboard → Proxy Pools → 新建 pool（填入你的代理列表）
  #   2. Providers → OpenCode Zen → 绑定这个 pool
  #   3. AxonHub 新建 channel，type=OpenAI，base_url=http://9router:20128/v1
  #   4. AxonHub 把 ds4f 模型映射到这个 channel
  #   5. 其他 channel（pro/gpt-5.5 等）直连 upstream，不走 9router
  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    # 仅本地暴露，Dashboard 通过 SSH tunnel 访问
    ports:
      - "127.0.0.1:20228:20128"
    volumes:
      - 9router-data:/app/data
    environment:
      DATA_DIR: /app/data
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production

      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      INITIAL_PASSWORD: ${DEFAULT_SK}
      API_KEY_SECRET: ${API_KEY_SECRET:-endpoint-proxy-api-key-secret}
      MACHINE_ID_SALT: ${MACHINE_ID_SALT:-endpoint-proxy-salt}
      REQUIRE_API_KEY: true
      AUTH_COOKIE_SECURE: false
      ENABLE_REQUEST_LOGS: false
      OBSERVABILITY_ENABLED: true

      BASE_URL: http://localhost:20228
      NEXT_PUBLIC_BASE_URL: http://localhost:20228
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"


