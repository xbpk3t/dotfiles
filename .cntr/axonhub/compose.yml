networks:
  edge:
    name: edge
    # 在 VPS 上，edge 网络由 Caddy compose 外部创建，需设 EDGE_NETWORK_EXTERNAL=true
    # 在本地，compose 自动创建该网络（默认值 false）
    # goland报错，但是已用 docker compose config 验证可用
    external: ${EDGE_NETWORK_EXTERNAL:-false}

volumes:
  axonhub_data:
  postgres_data:
  9router-data:
