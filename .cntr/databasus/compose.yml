---

services:
  databasus:
    container_name: databasus
    image: databasus/databasus:latest
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${TAILSCALE_IPV4:?TAILSCALE_IPV4 is required}:4005:4005"
    volumes:
      - databasus_data:/databasus-data
    networks:
      - axonhub-internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4005"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  # 依赖 axonhub compose 创建的 `axonhub-internal` 网络。
  # 启动顺序：先 `cd .cntr/axonhub && docker compose up -d`，再 `cd .cntr/databasus && docker compose up -d`。
  # 若 axonhub compose 执行 `down`，本服务会断网，需要 axonhub 重新 up 重建网络。
  axonhub-internal:
    name: axonhub-internal
    external: true

volumes:
  databasus_data:
