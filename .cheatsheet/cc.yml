---
# Claude Code (cc) 操作速查表
# 涵盖 TUI 快捷键、Session 管理、Agent View、Slash 命令等

# [Claude Code Cheat Sheet](https://cc.storyfox.cz/)


- type: TUI 快捷键
  cmds:
    - cmd: Ctrl+X, Ctrl+K
      des: 一键终止所有后台 agent
    - cmd: Ctrl+X, Ctrl+E (或 Ctrl+G)
      des: 在外部编辑器 ($EDITOR) 中打开当前 prompt
    - cmd: Ctrl+O
      des: 切换详细转录视图（显示完整 tool call），进入后 / 搜索、n/N 跳转、{/} 在 prompt 间跳、? 查看所有快捷键
    - cmd: Ctrl+B
      des: 将正在运行的前台任务丢到后台，继续工作
    - cmd: Ctrl+S
      des: 暂存当前 prompt，稍后恢复
    - cmd: Ctrl+U
      des: 清空整个输入缓冲区 (Ctrl+Y 恢复)
    - cmd: Ctrl+_
      des: 撤销 prompt 输入中的文本编辑
    - cmd: Ctrl+L
      des: 强制全屏重绘（界面花掉时用）
    - cmd: Ctrl+Z
      des: 挂起 Claude Code 到 shell，fg 恢复
    - cmd: Ctrl+R
      des: 跨项目搜索命令历史；picker 中再按 Ctrl+S 限定当前项目
    - cmd: Alt+T (或 Tab)
      des: 开关 thinking mode（跨 session 持久化）
    - cmd: Esc, Esc
      des: 清空 prompt / 关闭弹窗 / 中断 auto-accept 模式下的 Claude
    - cmd: Ctrl+A / Ctrl+E
      des: 多行输入中跳转到逻辑行首/行尾

- type: Session 管理
  cmds:
    - cmd: /resume
      des: 恢复后台 session；picker 中 Ctrl+A 显示所有项目的 session
    - cmd: /rename
      des: 给当前 session 起别名（在 Agent View 和 claude.ai/code 可见）
    - cmd: /color
      des: 给 session 的 prompt bar 换颜色；裸 /color 随机颜色
    - cmd: /undo (或 /rewind)
      des: 撤销上一次 tool call 或 turn
    - cmd: claude agents
      des: 打开 Agent View TUI，列出所有 session（运行中、阻塞、已完成）
    - cmd: claude --resume <uuid>
      des: 通过 UUID 直接恢复指定 session
    - cmd: claude --bg
      des: 以后台模式启动 Claude Code

- type: Agent View 操作
  cmds:
    - cmd: Ctrl+X 两次
      des: 删除当前选中的 session（破坏性操作，会清除 session 元数据和 job 目录）
      score: 5
    - cmd: j / k 或 Ctrl+N / Ctrl+P
      des: 在 session 列表中上下导航
    - cmd: Enter
      des: 附加 (attach) 到选中的 session
    - cmd: q
      des: 退出 Agent View

- type: Slash 命令
  cmds:
    - cmd: /spec
      des: 生成实现规约 (specification)，先规划再编码
    # - 【spec】我现在设置cc默认进 plan mode，在需求对齐后，怎么把plan转成spec呢？最佳实践是什么？我目前的方案：默认进PLAN mode，聊完需求之后进编辑模式，此时我会打断，然后执行/spec 指令，让他把spec落盘，你觉得这个方案怎么样？跟你上面的相比？ # 这个方案非常简洁，但是仍然需要在/spec后面补充prompt（这也是cc推荐做法）。所以我直接把gpt提供的prompt放到alfred snippets里了，加了一个spec

    - cmd: /goal
      des: 设定完成条件，Claude 自动跨 turn 工作直到满足；带实时统计浮层（耗时/turns/tokens）
    - cmd: /effort
      des: 交互式滑块调节 speed vs intelligence（方向键调节，Enter 确认）
    - cmd: /scroll-speed
      des: 调滚轮速度，实时预览
    - cmd: /t
      des: 临时禁用下一次 prompt 的 thinking（一次性）
    - cmd: /copy
      des: 交互式选择器，复制单个代码块或完整回复
    - cmd: /mcp
      des: 显示每个 MCP server 的工具数量，标记 0 tool 的 server
    - cmd: /reload-plugins
      des: 插件改动后无需重启即可激活
    - cmd: /context
      des: 查看当前上下文使用情况
    - cmd: /status
      des: 查看当前 session 状态
    - cmd: /help
      des: 显示帮助信息

- type: 多任务与队列
  cmds:
    - cmd: Enter（Claude 工作中）
      des: 排队追加消息，当前回复结束后自动发送
    - cmd: Esc（有排队 prompt 时）
      des: 把已排队的 prompt 撤回到输入框，不取消正在跑的任务

- type: CLI 操作
  cmds:
    - cmd: claude
      des: 启动 Claude Code（默认前台交互模式）
    - cmd: claude -p "prompt"
      des: 单次 prompt 模式（非交互），输出结果后退出
    - cmd: claude -c
      des: 从 stdin 读取内容作为上下文继续对话
    - cmd: claude --resume
      des: 交互式选择恢复之前的 session
    - cmd: claude --resume <uuid>
      des: 恢复指定 UUID 的 session
    - cmd: claude --bg
      des: 后台模式启动
    - cmd: claude agents
      des: 打开 Agent View TUI
    - cmd: claude rm <id>
      des: 删除指定 session（破坏性，等同于 Agent View 中 Ctrl+X 两次）
    - cmd: claude stop <id>
      des: 终止后台 session（SIGKILL，无优雅关闭）
    - cmd: claude update
      des: 更新 Claude Code 到最新版本
    - cmd: claude --version
      des: 查看版本号

- type: 外部编辑器集成
  cmds:
    - cmd: Ctrl+X, Ctrl+E
      des: 在 $EDITOR 中打开当前 prompt 编辑
    - cmd: Ctrl+G
      des: 同 Ctrl+X Ctrl+E，在编辑器中打开 prompt
    - cmd: Shift+Tab
      des: 切换是否在外部编辑器中默认打开 prompt

- type: 配置与调试
  cmds:
    - cmd: /config
      des: 打开 Claude Code 配置
    - cmd: /doctor
      des: 诊断 Claude Code 环境问题
    - cmd: claude --debug
      des: 以调试模式启动，输出详细日志
