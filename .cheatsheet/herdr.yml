---
# herdr 操作速查表
# https://herdr.dev
# 可理解为：tmux 的 session 持久 + zellij 的现代化 + cmux 的 agent-awareness
# 配合 ghostty 使用，替代 cmux 的 split pane + agent cockpit 角色
#
# 前缀键: ctrl+b（同 tmux，方便肌肉记忆）
# 与 cmux 对比锚点:
#   cmux Cmd+D          → herdr ctrl+b, v      # 垂直 split
#   cmux Cmd+Shift+D    → herdr ctrl+b, minus   # 水平 split
#   cmux Cmd+B (sidebar) → herdr ctrl+b, b
#   cmux Cmd+P (workspace) → herdr ctrl+b, w
#   cmux Cmd+Shift+W    → herdr ctrl+b, shift+d
#
# 所有鼠标操作（点击 pane/tab/workspace、drag 选择、双击 token）原生支持


- type: 启动与 Session 管理
  cmds:
    - cmd: herdr
      des: 启动 / attach 到默认 session；如有后台 server 则直接 reattach
    - cmd: herdr session attach <name>
      des: 启动 / attach 到命名 session（完全隔离的运行时状态）
    - cmd: ctrl+b, q
      des: detach 当前 client（server 和所有 pane 进程继续跑）
    - cmd: herdr server stop
      des: 停止默认 server（杀掉所有 pane 进程）
    - cmd: herdr update
      des: 更新 herdr 二进制；正在跑的 server 保持旧进程直到重启


- type: Pane 操作（Split / Focus / Close）
  cmds:
    - cmd: ctrl+b, v
      score: 5
      des: 垂直 split（当前 pane → 左右分屏）「cmux Cmd+D」
    - cmd: ctrl+b, minus（即 -）
      score: 5
      des: 水平 split（当前 pane → 上下分屏）「cmux Cmd+Shift+D」
    - cmd: ctrl+b, x
      score: 4
      des: 关闭当前 pane
    - cmd: ctrl+b, z
      score: 4
      des: zoom / unzoom 当前 pane（全屏切换）
    - cmd: ctrl+b, h / j / k / l
      score: 5
      des: 切换焦点到 左/下/上/右 的 pane（vim 方向）
    - cmd: ctrl+b, r 进入 resize，h/j/k/l 调整，esc 退出
      score: 3
      des: 调整 pane 大小


- type: Tab 操作
  cmds:
    - cmd: ctrl+b, c
      score: 4
      des: 新建 tab
    - cmd: ctrl+b, n / p
      des: 下一个 / 上一个 tab
    - cmd: ctrl+b, 1..9
      des: 直接跳到第 1-9 个 tab
    - cmd: 鼠标点击 tab 标签
      des: 切换到该 tab（鼠标原生支持）


- type: Workspace 操作
  cmds:
    - cmd: ctrl+b, shift+n
      score: 5
      des: 新建 workspace（project 级容器，有独立 cwd）
    - cmd: ctrl+b, w
      score: 5
      des: 打开 workspace 导航（快速跳转，类似 cmux Cmd+P）
    - cmd: ctrl+b, g
      des: 打开 session 导航器
    - cmd: ctrl+b, shift+w
      des: 重命名当前 workspace
    - cmd: ctrl+b, shift+d
      des: 关闭当前 workspace「cmux Cmd+Shift+W」
    - cmd: ctrl+b, shift+g
      score: 4
      des: 基于 git worktree 新建 workspace（自动 checkout branch）


- type: Agent / Sidebar
  cmds:
    - cmd: ctrl+b, b
      score: 4
      des: 显示/隐藏左侧 agent state sidebar（status: blocked/working/done/idle）
    - cmd: 在 sidebar 中单击
      des: 跳转到对应 workspace/agent
    - cmd: herdr agent focus <target>
      des: 通过 CLI 将焦点切换到某 agent


- type: 复制操作
  cmds:
    - cmd: 鼠标拖选 pane 内文本
      score: 5
      des: 拖选即复制（原生支持，无需额外按键）
    - cmd: 鼠标双击单词
      des: 双击即复制该 token
    - cmd: ctrl+b, [
      des: 进入键盘复制模式（v 开始选择，y 复制，q/esc 退出）


- type: 远程连接
  cmds:
    - cmd: herdr --remote workbox
      score: 4
      des: 通过 SSH 连接到远程 host 上的 herdr server（无需先 ssh 再 herdr）
    - cmd: herdr --remote ssh://user@host:2222
      des: 指定端口 SSH 连接
    - cmd: herdr terminal attach <terminal_id>
      des: 直接 attach 到某个终端进程
    - cmd: herdr agent attach <target>
      des: 直接 attach 到某个 agent


- type: CLI 辅助（脚本 / 自动化）
  cmds:
    - cmd: herdr pane split <pane_id> --direction right [--cwd PATH] [--focus]
      des: 通过 CLI 创建垂直 split（供脚本/快捷键绑定调用）
    - cmd: herdr pane split <pane_id> --direction down
      des: 通过 CLI 创建水平 split
    - cmd: herdr pane run <pane_id> <command>
      des: 在指定 pane 里执行命令（比 send-text + enter 更干净）
    - cmd: herdr pane send-text <pane_id> <text>
      des: 向 pane 发送文本（不自动 enter）
    - cmd: herdr pane read <pane_id> --source recent-unwrapped --lines 120
      des: 读取 pane 输出（适合 agent 拿另一个 pane 的日志）
    - cmd: herdr workspace create --cwd ~/project --label api
      des: CLI 创建 workspace
    - cmd: herdr wait output <pane_id> --match "ready" [--timeout MS]
      des: 等待 pane 输出匹配文本（用于自动化编排）


- type: 配置与维护
  cmds:
    - cmd: ~/.config/herdr/config.toml
      des: herdr 配置文件（TOML 格式）
    - cmd: herdr --default-config
      des: 打印完整默认配置
    - cmd: ~/.config/herdr/herdr-client.log / herdr-server.log
      des: 日志文件，排查问题时优先查看
