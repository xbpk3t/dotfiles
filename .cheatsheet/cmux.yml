---
# 剔除了通用快捷键，只保留了 cmux 独有或更有价值的快捷键



### cmux tricks

# 1、Custom Rename Workspace
# 2、给workspace添加 color，用来标识不同状态（比如说我现在就红绿两种：绿色代表重要但是暂时处理不了。红色代表urgent task需要立即处理。）
# 3、默认split window. 比如说需要两个agent 分别作为 builder和reviewer时会很有用，很直观。至于tab则用来执行各自agent的相应操作。
# 
# 4、暂时不建议使用 browser功能。有些bug，会导致cmux直接hang住。


- type: 高频操作
  cmds:
    - cmd: CMD + Shift + P
      des: 打开 Command Palette；适合快速执行 cmux 命令/自定义 commands（跟 ghostty 类似）
#    - cmd: Ctrl + Option + CMD + .
#      des: 全局显示/隐藏所有 cmux 窗口
    - cmd: Option + CMD + F
      des: 全局搜索 cmux 内容
#    - cmd: CMD + Shift + ,
#      des: 重新加载 cmux 配置；改完 cmux.json 后很常用
    - cmd: CMD + Shift + O
      des: 重新打开上一个 session

- type: Workspace 操作
  cmds:
    - cmd: CMD + B
      des: 显示/隐藏左侧 workspace sidebar
    - cmd: CMD + Option + B
      des: 显示/隐藏右侧 sidebar / file explorer
    - cmd: CMD + P
      des: 打开 workspace switcher，快速跳转 workspace
    - cmd: Ctrl + CMD + ]
      des: 切到下一个 workspace
    - cmd: Ctrl + CMD + [
      des: 切到上一个 workspace

    - cmd: CMD + Shift + R
      des: 重命名 workspace
      score: 5

    - cmd: Option + CMD + E
      des: 编辑 workspace 描述（通常搭配 rename workspace使用）
      score: 2


    - cmd: CMD + Shift + W
      des: 关闭当前 workspace
      score: 5

#    - cmd: CMD + 1...9
#      des: 直接切到第 1-9 个 workspace


- type: sidebar
  cmds:
    - cmd: CMD + Shift + E
      des: 切换右侧 sidebar 焦点
    - cmd: J / K / Ctrl + N / Ctrl + P / H / L
      des: 在 focused sidebar rows 中导航；Files 里 H/L 可折叠/展开文件夹，/ 开始搜索




- type: Surface / Tab 操作
  cmds:
    - cmd: CMD + Shift + ]
      des: 切到下一个 surface / pane 内 tab
    - cmd: CMD + Shift + [
      des: 切到上一个 surface / pane 内 tab
    - cmd: Ctrl + 1...9
      des: 直接切到当前 pane 里的第 1-9 个 surface
    - cmd: Option + CMD + T
      des: 关闭当前 pane 里的其他 tabs
    - cmd: CMD + Shift + T
      des: 重新打开已关闭的 browser panel
    - cmd: CMD + Shift + M
      des: 切换 terminal copy mode

- type: Split Pane 操作
  cmds:
    - cmd: Option + CMD + 方向键（←/→/↑/↓）
      des: 聚焦 pane
    - cmd: CMD + D
      score: 5
      des: 向右 split terminal

    - cmd: CMD + Shift + D
      des: 向下 split terminal

    - cmd: CMD + Shift + Enter
      des: 当前 pane zoom / 取消 zoom
    - cmd: Ctrl + CMD + =
      des: 均分 split 尺寸

#    - cmd: Option + CMD + D
#      des: 向右 split browser
#    - cmd: Option + CMD + Shift + D
#      des: 向下 split browser





