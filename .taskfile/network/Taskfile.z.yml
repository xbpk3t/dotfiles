  wifi:
    # score: 2 — recommend: internal, nmcli Wi-Fi 管理，和 iw 功能重叠
    desc: Manage Wi-Fi via nmcli
    summary: "task -g nz:wifi"
    cmds:
      - sudo nmcli dev # 查看网络设备
      - sudo nmcli r wifi on # 开启wifi
      - sudo nmcli dev wifi # 扫描wifi
      - sudo nmcli dev wifi connect wifi-name password pwd # 连接wifi
    preconditions:
      - sh: command -v nmcli
        msg: nmcli not found
