---
version: '3'

tasks:
  list:
    # score: 2 — recommend: internal, bpftrace probe 列举，仅 linux 内核追踪场景
    desc: bpftrace list probes
    summary: "task -g list"
    platforms: [linux]
    preconditions:
      - sh: command -v bpftrace
        msg: bpftrace not found
    cmds:
      - sudo bpftrace -l

  run:
    # score: 2 — recommend: internal, bpftrace 动态追踪，特定场景但非日常
    desc: bpftrace run one-liner
    summary: "task -g run PROG=<script>"
    vars:
      PROG: ''
    platforms: [linux]
    requires:
      vars: [PROG]
    preconditions:
      - sh: command -v bpftrace
        msg: bpftrace not found
    cmds:
      # PROG 为 bpftrace script
      - sudo bpftrace '{{.PROG}}'

  prog:
    # score: 2 — recommend: internal, bpftool 查看 BPF 程序，排查 BPF 相关问题时有用
    desc: bpftool prog show
    summary: "task -g prog"
    platforms: [linux]
    preconditions:
      - sh: command -v bpftool
        msg: bpftool not found
    cmds:
      - sudo bpftool prog show

  map:
    # score: 2 — recommend: internal, bpftool map，同上场景
    desc: bpftool map show
    summary: "task -g map"
    platforms: [linux]
    preconditions:
      - sh: command -v bpftool
        msg: bpftool not found
    cmds:
      - sudo bpftool map show

  net:
    # score: 3 — recommend: public, bpftool 查看网络 attach 点，网络 BPF 调试时有用
    desc: bpftool net list
    summary: "task -g net"
    platforms: [linux]
    preconditions:
      - sh: command -v bpftool
        msg: bpftool not found
    cmds:
      # net: attach points
      - sudo bpftool net
