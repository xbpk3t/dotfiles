  arping:
    # arping
    # - 用来做二层可达性/ARP 邻居探测。
    # - 关注“这个 IP 在这个二层上能不能回应 ARP”。
    # score: 3 — recommend: public, 二层可达性排查，特定场景有用但非日常
    desc: arping (L2 reachability)
    summary: "task -g default HOST=<host> [COUNT=5] [IFACE=<iface>]"
    platforms: [linux]
    requires:
      vars: [HOST]
    vars:
      COUNT: '{{.COUNT | default "5"}}'
      HOST: ''
      IFACE: ''
    preconditions:
      - sh: command -v arping
        msg: arping not found
    cmds:
      # -I: 指定 interface
      - arping -c {{.COUNT}} {{ if .IFACE }}-I {{.IFACE}} {{ end }}{{.HOST}}


  # [jsdelivr/globalping-cli: A simple CLI tool to run networking commands remotely from hundreds of globally distributed servers](https://github.com/jsdelivr/globalping-cli)
  global-ping:
    # score: 3 — recommend: public, 全球分布式节点探测，特定场景有用
    desc: Run globalping ping from distributed probes
    summary: "task -g nz:global-ping [CLI_ARGS]"
    cmd: globalping ping {{.CLI_ARGS}}


  nping:
    # score: 3 — recommend: public, PMTU 探测专用，场景明确但非高频
    desc: nping ICMP for PMTU probing
    summary: "task -g pmtu HOST=<host> [SIZE=1472]"
    platforms: [linux]
    requires:
      vars: [HOST]
    vars:
      # SIZE 是 payload，1472 = 1500 - 20(IPv4) - 8(ICMP)
      SIZE: '{{.SIZE | default "1472"}}'
      HOST: ''
    preconditions:
      - sh: command -v nping
        msg: nping not found
    cmds:
      # PMTU probing 默认不额外限制 count，适合手动观察反馈
      - sudo nping --icmp {{.HOST}} --data-length {{.SIZE}}

      # score: 3 — recommend: public, nping ICMP probe，有 ping 可替代但提供额外数据长度控制
      # --icmp: ICMP probe, --data-length: payload bytes
      # - sudo nping --icmp {{.HOST}} --data-length {{.SIZE}} -c {{.COUNT}}

#  stats:
#    # score: 2 — recommend: internal, nstat ICMP 内核计数器，诊断时补充证据用
#    desc: Show ICMP/IP fragment counters via nstat
