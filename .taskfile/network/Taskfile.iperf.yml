---
version: '3'


tasks:
  server:
    # score: 3 — recommend: public, iperf3 server 模式，按需启动
    desc: Start iperf3 server
    summary: "task -g throughput:server [BIND=<addr>] [PORT=5201]"
    platforms: [linux, darwin]
    vars:
      BIND: '{{.BIND | default ""}}'
      PORT: '{{.PORT | default "5201"}}'
    preconditions:
      - sh: command -v iperf3 >/dev/null 2>&1
        msg: iperf3 not found
    cmds:
      - iperf3 -s {{ if .BIND }}-B {{.BIND}} {{ end }}-p {{.PORT}}

  tcp:
    # score: 4 — recommend: public, iperf3 TCP 吞吐测试，带宽评估高频
    desc: Run iperf3 TCP throughput test
    summary: "task -g throughput:tcp HOST=<host> [DURATION=10] [PORT=5201]"
    platforms: [linux, darwin]
    requires:
      vars: [HOST]
    vars:
      HOST: '{{.HOST | default ""}}'
      DURATION: '{{.DURATION | default "10"}}'
      PORT: '{{.PORT | default "5201"}}'
    preconditions:
      - sh: command -v iperf3 >/dev/null 2>&1
        msg: iperf3 not found
    cmds:
      - iperf3 -c {{.HOST}} -t {{.DURATION}} -p {{.PORT}}

  udp:
    # score: 3 — recommend: public, UDP 吞吐测试，特定场景
    desc: Run iperf3 UDP throughput test
    summary: "task -g throughput:udp HOST=<host> [BANDWIDTH=100M] [DURATION=10] [PORT=5201]"
    platforms: [linux, darwin]
    requires:
      vars: [HOST]
    vars:
      HOST: '{{.HOST | default ""}}'
      BANDWIDTH: '{{.BANDWIDTH | default "100M"}}'
      DURATION: '{{.DURATION | default "10"}}'
      PORT: '{{.PORT | default "5201"}}'
    preconditions:
      - sh: command -v iperf3 >/dev/null 2>&1
        msg: iperf3 not found
    cmds:
      - iperf3 -u -c {{.HOST}} -b {{.BANDWIDTH}} -t {{.DURATION}} -p {{.PORT}}

  parallel:
    # score: 3 — recommend: public, 多流并发压测，高级场景
    desc: Run iperf3 multi-stream TCP throughput test
    summary: "task -g throughput:parallel HOST=<host> [STREAMS=8] [DURATION=10] [PORT=5201]"
    platforms: [linux, darwin]
    requires:
      vars: [HOST]
    vars:
      HOST: '{{.HOST | default ""}}'
      STREAMS: '{{.STREAMS | default "8"}}'
      DURATION: '{{.DURATION | default "10"}}'
      PORT: '{{.PORT | default "5201"}}'
    preconditions:
      - sh: command -v iperf3 >/dev/null 2>&1
        msg: iperf3 not found
    cmds:
      - iperf3 -c {{.HOST}} -P {{.STREAMS}} -t {{.DURATION}} -p {{.PORT}}

  bidir:
    # score: 2 — recommend: internal, 双向吞吐测试，场景窄
    desc: Run iperf3 bidirectional TCP throughput test
    summary: "task -g throughput:bidir HOST=<host> [DURATION=10] [PORT=5201]"
    platforms: [linux, darwin]
    requires:
      vars: [HOST]
    vars:
      HOST: '{{.HOST | default ""}}'
      DURATION: '{{.DURATION | default "10"}}'
      PORT: '{{.PORT | default "5201"}}'
    preconditions:
      - sh: command -v iperf3 >/dev/null 2>&1
        msg: iperf3 not found
    cmds:
      - iperf3 -c {{.HOST}} -d -t {{.DURATION}} -p {{.PORT}}
