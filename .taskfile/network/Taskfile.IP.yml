---
version: '3'

# [2026-03-31] 把 tc 整合到了 Taskfile.iproute2.yml 里
#
# 本轮移除的工具级 task：
# - tc
#
# 为什么把 tc 收进这里：
# - tc 属于 iproute2 工具族，继续拆成独立 Taskfile 的收益不高。
# - 当前保留的 qdisc / class / filter 都是接口级只读观察动作，和 addr / route /
#   rule / neigh 属于同一层系统网络状态检查。
# - 因此本轮把 tc 收进 Taskfile.iproute2.yml，统一成“IP 路由与接口状态”入口。

tasks:
  default:
    desc: iproute2核心命令
    summary: "task -g link"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - echo 查看网络接口
      - ip link show
      - echo 查看 IP 地址配置
      - ip addr show
      - echo 查看路由表(IPv4 routes)
      - ip route show
      - echo 查看IPv6 路由表(IPv6 routes)
      - ip -6 route show
      - echo 策略路由规则查看，高级路由排查
      - ip rule show
      - echo ARP/NDP 邻居表，二层排障高频
      - ip neigh show



  class:
    desc: tc class show
    summary: "task -g class IFACE=<iface>"
    vars:
      IFACE: '{{.IFACE | default ""}}'
    platforms: [linux]
    requires:
      vars: [IFACE]
    preconditions:
      - sh: command -v tc >/dev/null 2>&1
        msg: tc not found
    cmds:
      # 查看接口队列策略，性能调优有用
      # qdisc = queueing discipline，适合看接口当前队列策略
      - sudo tc qdisc show dev {{.IFACE}}

      # tc class 查看，QoS 场景才用
      - sudo tc class show dev {{.IFACE}}

      # tc filter 查看，QoS 场景才用
      # filter 视图适合检查 tc classifier / action 的挂载情况
      - sudo tc filter show dev {{.IFACE}}


