---
version: '3'

# [2026-03-31] 把 tc 整合到了 Taskfile.iproute2.yml 里
#
# 本轮移除的工具级 task：
# - tc
#
# 为什么把 tc 收进这里：
# - tc 属于 iproute2 工具族，继续拆成独立 Taskfile 的收益不高。
# - 当前保留的 qdisc / class / filter 都是接口级只读观察动作，和 addr / route /
#   rule / neigh 属于同一层系统网络状态检查。
# - 因此本轮把 tc 收进 Taskfile.iproute2.yml，统一成“IP 路由与接口状态”入口。

tasks:
  link:
    # score: 5 — recommend: public, 查看网络接口，最基础操作
    desc: ip link show (list links)
    summary: "task -g link"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - ip link show

  addr:
    # score: 5 — recommend: public, 查看 IP 地址配置，高频
    desc: ip addr show (list addresses)
    summary: "task -g addr"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - ip addr show

  route:
    # score: 5 — recommend: public, 查看路由表，网络排障核心
    desc: ip route show (IPv4 routes)
    summary: "task -g route"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - ip route show

  route6:
    # score: 3 — recommend: public, IPv6 路由表，特定场景
    desc: ip -6 route show (IPv6 routes)
    summary: "task -g route6"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - ip -6 route show

  rule:
    # score: 4 — recommend: public, 策略路由规则查看，高级路由排查
    desc: ip rule show (policy routing)
    summary: "task -g rule"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - ip rule show

  neigh:
    # score: 4 — recommend: public, ARP/NDP 邻居表，二层排障高频
    desc: ip neigh show (ARP/NDP)
    summary: "task -g neigh"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      - ip neigh show

  monitor:
    # score: 2 — recommend: internal, 实时监控路由/地址变化，调试场景
    desc: ip monitor (addr/route/neigh changes)
    summary: "task -g monitor"
    platforms: [linux]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      # 适合排查路由/邻居表变化
      - ip monitor

  route:get:
    # score: 4 — recommend: public, 查看到目的地址的实际选路，排障高频
    desc: ip route get (path to destination)
    summary: "task -g route:get DST=<ip|host>"
    vars:
      DST: ''
    platforms: [linux]
    requires:
      vars: [DST]
    preconditions:
      - sh: command -v ip
        msg: ip not found
    cmds:
      # 查看目的地址的实际选路
      - ip route get {{.DST}}

  qdisc:
    # score: 3 — recommend: public, 查看接口队列策略，性能调优有用
    desc: tc qdisc show
    summary: "task -g qdisc IFACE=<iface>"
    vars:
      IFACE: '{{.IFACE | default ""}}'
    platforms: [linux]
    requires:
      vars: [IFACE]
    preconditions:
      - sh: command -v tc >/dev/null 2>&1
        msg: tc not found
    cmds:
      # qdisc = queueing discipline，适合看接口当前队列策略
      - sudo tc qdisc show dev {{.IFACE}}

  class:
    # score: 2 — recommend: internal, tc class 查看，QoS 场景才用
    desc: tc class show
    summary: "task -g class IFACE=<iface>"
    vars:
      IFACE: '{{.IFACE | default ""}}'
    platforms: [linux]
    requires:
      vars: [IFACE]
    preconditions:
      - sh: command -v tc >/dev/null 2>&1
        msg: tc not found
    cmds:
      - sudo tc class show dev {{.IFACE}}

  filter:
    # score: 2 — recommend: internal, tc filter 查看，QoS 场景才用
    desc: tc filter show
    summary: "task -g filter IFACE=<iface>"
    vars:
      IFACE: '{{.IFACE | default ""}}'
    platforms: [linux]
    requires:
      vars: [IFACE]
    preconditions:
      - sh: command -v tc >/dev/null 2>&1
        msg: tc not found
    cmds:
      # filter 视图适合检查 tc classifier / action 的挂载情况
      - sudo tc filter show dev {{.IFACE}}
