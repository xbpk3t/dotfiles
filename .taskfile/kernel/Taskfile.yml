  mem:
    desc: "memory default"
    summary: "task -g kernel:mem"
    platforms: [linux]
    cmds:
      - task: _summary
      - task: _swap


  # 内存/Swap 模块化任务（可被 sysinfo/monitor 复用）
  # 注意：这类任务仅查询，不做写操作
  _summary:
    platforms: [linux]
    internal: true
    cmds:
      # 物理内存总览（bytes）
      - free -b
      # 物理内存 + swap 总览（MB）
      - free -m

  _swap:
    platforms: [linux]
    internal: true
    cmds:
      - echo -e "\n===== Swap Devices ====="
      # swapon 是用户态视角（推荐）
      - swapon --show
      # /proc/swaps 是内核视角（更底层）
      - cat /proc/swaps
      - echo -e "\n===== Swap In/Out (vmstat) ====="
      # si/so: swap in/out（单位：KB/s），快速判断是否发生 swap 抖动
      - vmstat 1 5


#  _detail:
#    desc: "memory detail"
#    summary: "task -g detail"
#    platforms: [linux]
#    internal: true
#    cmds:
#      # /proc/meminfo 关键字段（更详细）
#      - cat /proc/meminfo | grep -E 'MemTotal|MemFree|MemAvailable|Buffers|Cached|SwapTotal|SwapFree|SwapCached'





  # 完整诊断套件 (默认任务)
  monitor:
    desc: 执行完整的60秒快速诊断
    summary: "task -g kernel:monitor"
    interactive: true
    silent: true
    cmds:
      - task: _basic
      - task: _cpu
      - task: _disk
      # - task: _memory
      - task: _network
      - task: _top

  # 基础系统状态检查
  _basic:
    internal: true
    desc: "basic 任务"
    summary: "task -g monitor:_basic"
    cmds:
      - echo "===== 基础系统状态 ====="
      - uptime
      - echo -e "\n===== 最近系统日志 ====="
      - dmesg | tail -10

  # CPU和进程分析
  _cpu:
    internal: true
    desc: "cpu 任务"
    summary: "task -g monitor:_cpu"
    cmds:
      - echo -e "\n===== CPU统计 (每1秒刷新，共5次) ====="
      - vmstat 1 5
      - echo -e "\n===== 各CPU核心利用率 ====="
      - mpstat -P ALL 1 5
      - echo -e "\n===== 进程级CPU统计 ====="
      - pidstat 1 5

  # 磁盘I/O分析
  _disk:
    internal: true
    desc: "disk 任务"
    summary: "task -g monitor:_disk"
    cmds:
      - echo -e "\n===== 磁盘I/O统计 ====="
      - iostat -xz 1 5

  # 网络分析
  _network:
    internal: true
    desc: "network 任务"
    summary: "task -g monitor:_network"
    cmds:
      - echo -e "\n===== 网络设备统计 ====="
      - sar -n DEV 1 5
      - echo -e "\n===== TCP连接统计 ====="
      - sar -n TCP,ETCP 1 5

  # 综合监控
  _top:
    internal: true
    desc: "top 任务"
    summary: "task -g monitor:_top"
    cmds:
      - echo -e "\n===== 实时进程监控 ====="
      - top -b -n 1 -o %CPU | head -20



