---
version: "3"


#- url: https://github.com/ImageMagick/ImageMagick
#  des: ImageMagick 用来用cli执行各种图片操作（比如压缩、）

#- 我自己的图片都需要png格式的，但是有很多图片本身是jpg格式的，在网页操作很麻烦，怎么用cli批量操作? # 'find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -exec sh -c 'magick mogrify -format png "{}" && rm "{}"' \;' #  # 注意这里使用的mogrify本身是支持直接替换的，但是如果使用-format就无法替换了，所以后面需要使用rm手动删除
#- magick in.png -resize 50% out.png # 压缩PNG图片


vars:
  IMG_SCRIPT: '{{.TASKFILE_DIR}}/scripts/img.nu' # 重要：图片转换逻辑统一收敛到 nushell script，Taskfile 只负责 orchestration
  DEFAULT_WEBP_QUALITY: '85' # 重要：jpg/jpeg -> webp 的默认 quality；png 仍然固定走 lossless


tasks:
  _ensure:nu:
    internal: true
    preconditions:
      - sh: command -v nu >/dev/null
        msg: nu not found
      - sh: test -f "{{.IMG_SCRIPT}}"
        msg: "{{.IMG_SCRIPT}} not found"
    cmd: true


  _ensure:magick:
    internal: true
    preconditions:
      - sh: command -v magick >/dev/null
        msg: magick not found
    cmd: true


  _ensure:cwebp:
    internal: true
    preconditions:
      - sh: command -v cwebp >/dev/null
        msg: cwebp not found
    cmd: true


  jpg2png:
    desc: jpg-to-png
    summary: "task -g img:jpg2png"
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: _ensure:nu
      - task: _ensure:magick
      - 'nu "{{.IMG_SCRIPT}}" jpg2png --root "{{.USER_WORKING_DIR}}"'


  webp:
    desc: convert jpg/png to webp
    summary: "task -g img:webp [Q=85]"
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      WEBP_QUALITY: '{{if .Q}}{{.Q}}{{else}}{{.DEFAULT_WEBP_QUALITY}}{{end}}'
    preconditions:
      - sh: 'case "{{.WEBP_QUALITY}}" in ""|*[!0-9]*) exit 1 ;; *) [ "{{.WEBP_QUALITY}}" -ge 0 ] && [ "{{.WEBP_QUALITY}}" -le 100 ] ;; esac'
        msg: Q must be an integer between 0 and 100
    cmds:
      - task: _ensure:nu
      - task: _ensure:cwebp
      - 'nu "{{.IMG_SCRIPT}}" webp --root "{{.USER_WORKING_DIR}}" --quality "{{.WEBP_QUALITY}}"'
