version: "3"

# install            Install prek Git shims into Git's effective hooks directory.
# prepare-hooks      Prepare environments for all hooks used in the config file.
# run                Run hooks.
# sample-config      Produce a sample configuration file.
# try-repo           Try hooks from another repository.
# uninstall          Uninstall prek Git shims.
# validate-config    Validate configuration files.
# validate-manifest  Validate .pre-commit-hooks.yaml files.
# auto-update        Update remote repository rev fields.

vars:
  HOOKS:
    - yamllint
    - golangci-lint
    - golangci-lint-full
    - markdownlint
    - nilaway
    - betteralign
    - gitleaks
    - statix-fix
    - statix-check
    - deadnix
    - mermaid-lint
    - plantuml-check


# [2026-03-31] 精简 hook task
#
# 本轮移除的 task：
# - init-template
# - migrate
# - try-repo
#
# 删除原因：
# - 这三个动作都不是当前仓库里高频、稳定的日常 workflow。
# - init-template 和 migrate 更偏一次性初始化 / 历史配置迁移，属于“知道有这个命令
#   即可”的低频操作，不值得长期挂在 Taskfile 主入口里。
# - try-repo 更偏 hook 开发 / 调试场景，不像普通仓库使用者会反复执行。
# - 另外，init-template 和 try-repo 都依赖 CLI_ARGS 透传，多参数语义不清，也不符合
#   当前这轮 Taskfile 收敛方向。
#
# 后续又继续移除的 task：
# - update
# - uninstall
#
# 进一步删除原因：
# - update 只是远端 hook rev 更新的单步封装；当前不再单独保留一个更轻的 update
#   入口，避免把日常维护和 remote rev bump 混在一起。
# - uninstall 的语义只是移除当前仓库 .git/hooks/ 里的 hook wrapper，
#   不会删除 .pre-commit-config.yaml，也不会清理本地 cache；对当前仓库的日常维护来说，
#   这个动作过于边缘，不值得继续挂在主入口里。




tasks:
  default:
    desc: 运行当前仓库所有 Prek hooks
    summary: |
      task -g pc

      在调用目录执行 `prek run --all-files`，用于检查当前仓库全部已跟踪文件。
    cmd: prek run --all-files
    dir: '{{.USER_WORKING_DIR}}'
    interactive: true

  hook:
    desc: 执行指定hook（交互式选择或直接运行检查）
    summary: |
      task -g pc:hook
      task -g pc:hook -- check-json

      未传参数时从 HOOKS 白名单中交互选择一个 hook；传入参数时直接执行 `prek run <hook>`。
    interactive: true
    dir: '{{.USER_WORKING_DIR}}'
    cmd: |
      selected='{{.CLI_ARGS}}'
      if [ -z "$selected" ]; then
        selected="$(gum choose {{.HOOKS | join " "}})"
      fi
      prek run "$selected"

  # 维护任务：clean + gc + 重装已存在的 hook wrapper + 重装工具环境
  #
  # [2026-05-28] 添加 hook wrapper 重装
  # 背景：Nix GC（nix-collect-garbage）会清除旧 generation 的 store 路径，
  # 而 hook install 会将当前 Nix store 的绝对路径硬编码写入
  # .git/hooks/pre-commit 和 .git/hooks/pre-push（包括 shebang 和 exec 行）。
  # GC 后这些路径变死链接 → git push 报错 "cannot exec .git/hooks/pre-push"。
  #
  # 只重装当前仓库里已经存在的 hook type，避免 maintain 意外启用新的 commit-msg 等行为。
  maintain:
    desc: 对当前仓库的 Prek cache 和 hook wrapper 进行维护
    summary: |
      task -g pc:maintain

      执行 `prek cache clean`、`prek cache gc`，并只覆盖重装当前仓库 .git/hooks/ 下已经存在的
      pre-commit/pre-push/commit-msg wrapper。若当前仓库没有这些 wrapper，则只执行
      `prek prepare-hooks`。
    cmds:
      - prek cache clean
      - prek cache gc
      - |
        hook_args=""
        for hook_type in pre-commit pre-push commit-msg; do
          hook_path="$(git rev-parse --git-path "hooks/$hook_type")"
          if [ -f "$hook_path" ]; then
            hook_args="$hook_args --hook-type $hook_type"
          fi
        done

        if [ -n "$hook_args" ]; then
          # hook_args only contains fixed hook names from the loop above.
          prek install --overwrite --prepare-hooks $hook_args
        else
          prek prepare-hooks
        fi
    dir: '{{.USER_WORKING_DIR}}'
