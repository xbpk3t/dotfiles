---
version: '3'

vars:
  RCLONE_REMOTE: "r2"                     # rclone.conf 中的存储配置名
  TREE_SIG_SCRIPT: '{{.TASKFILE_DIR}}/scripts/tree-sig.nu' # 重要：tree signature 逻辑统一收敛到 nushell script，Taskfile 只负责 orchestration




tasks:
  default:
    desc: 上传本地文件到远程
    summary: "task -g default"
    cmds:
      - task: '{{.TASK}}'
    vars:
      TASK:
        sh: gum choose sync-docs-images bisync-scratches
        msg: 选择待上传的bucket

  sync:
    internal: true
    desc: rclone sync 操作
    requires:
      vars: [BUCKET, LOCAL_PATH]
    cmds:
      #      - 'rclone sync --update --checksum --fast-list --transfers 30 --s3-upload-concurrency 30 "{{.LOCAL_PATH}}" "{{.RCLONE_REMOTE}}:{{.BUCKET}}" --stats=10s --progress {{.DRY_RUN_FLAG}}'
      - 'rclone sync --update --checksum --fast-list --transfers 30 --s3-upload-concurrency 30 "{{.LOCAL_PATH}}" "{{.RCLONE_REMOTE}}:{{.BUCKET}}" --stats-one-line -v {{.EXCLUDE_FLAGS}} {{.DRY_RUN_FLAG}}'

  bisync:
    internal: true
    desc: rclone bisync 操作
    cmds:
      - 'rclone bisync "{{.LOCAL_PATH}}" "{{.RCLONE_REMOTE}}:{{.BUCKET}}" --create-empty-src-dirs --resync --stats-one-line -v {{.DRY_RUN_FLAG}}'
    requires:
      vars: [RCLONE, LOCAL_PATH, RCLONE_REMOTE, BUCKET, DRY_RUN_FLAG]


  check:
    internal: true
    desc: rclone check 操作
    cmds:
      - 'rclone check "{{.LOCAL_PATH}}" "{{.RCLONE_REMOTE}}:{{.BUCKET}}" --size-only --one-way {{.DRY_RUN_FLAG}}'
    requires:
      vars: [RCLONE, LOCAL_PATH, RCLONE_REMOTE, BUCKET, DRY_RUN_FLAG]


  sync-docs-images:
    desc: 同步 docs-images 到远程（用于 systemd）
    summary: "task -g rclone:sync-docs-images"
    vars:
      DOCS_IMAGES_LOCAL_PATH: "$HOME/Desktop/docs/docs-images"
      DOCS_IMAGES_SYNC_STAMP: "docs-images-sync.stamp" # 重要：这里只传 stamp 文件名；最终路径由 tree-sig.nu 基于 folder 解析到父目录 `.task/`

      # 重要参数：排除 Git metadata、本地 IDE/cache 与 macOS Finder 元数据噪音
      # 注意 --delete-excluded 用来移除掉掉目前已经上传到remote的exclude文件，保证remote跟local完全一致
      DOCS_IMAGES_EXCLUDE_FLAGS: '--exclude ".git/**" --exclude ".idea/**" --exclude ".cache/**" --exclude ".DS_Store" --exclude "**/.DS_Store" --exclude "._*" --exclude "**/._*" --delete-excluded'
    status:
      # 重要：status 调用 nushell script 做布尔判断。
      # 这样 status 仍然符合 Task 的 shell contract，同时把复杂逻辑留在 script 层维护。
      - |
        nu "{{.TREE_SIG_SCRIPT}}" check \
          --folder "{{.DOCS_IMAGES_LOCAL_PATH}}" \
          --stamp "{{.DOCS_IMAGES_SYNC_STAMP}}"
    cmds:
      - task: sync
        vars:
          DRY_RUN_FLAG: ""
          EXCLUDE_FLAGS: "{{.DOCS_IMAGES_EXCLUDE_FLAGS}}"
          BUCKET: "docs"
          LOCAL_PATH: "{{.DOCS_IMAGES_LOCAL_PATH}}"
      - |
        nu "{{.TREE_SIG_SCRIPT}}" write \
          --folder "{{.DOCS_IMAGES_LOCAL_PATH}}" \
          --stamp "{{.DOCS_IMAGES_SYNC_STAMP}}"
      - echo "Execute sync-docs task success"
    preconditions:
      - sh: command -v "rclone" >/dev/null
        msg: "rclone not found: install rclone"
      - sh: command -v nu >/dev/null
        msg: "nu not found"
      - sh: test -d "{{.DOCS_IMAGES_LOCAL_PATH}}/"
        msg: "Directory {{.DOCS_IMAGES_LOCAL_PATH}} does not exist"


  bisync-scratches:
    desc: 双向同步 scratches 到 R2
    summary: "task -g rclone:bisync-scratches"
    cmds:
      - task: bisync
        vars:
          LOCAL_PATH:
            sh: |
              jb="$HOME/Library/Application Support/JetBrains"
              ls -d "$jb"/*/scratches 2>/dev/null | head -n1
          DRY_RUN_FLAG: ""
          BUCKET: "scratches"
      - echo "Execute bisync-scratches task success"
    preconditions:
      - sh: test -d "$HOME/Library/Application Support/JetBrains"/*/scratches
        msg: "No JetBrains IDE scratches directory found"

  config:
    desc: 查看 rclone 相关配置
    summary: "task -g rclone:config BUCKET=bucket [TARGET_PATH=path]"
    interactive: true
    silent: true
    vars:
      BUCKET: ''
      TARGET_PATH: ''
    requires:
      vars: [BUCKET]
    cmds:
      - echo "rclone 配置文件路径"
      - 'rclone config file'
      - echo "统计远程存储使用量"
      - 'rclone size {{.RCLONE_REMOTE}}:{{.BUCKET}}'
      - echo "列出所有配置的远程存储"
      - 'rclone listremotes'
      - echo "列出远程文件详情（含大小/时间）" # 列出指定路径下的所有的文件以及文件大小和路径，并且显示上传时间
      - 'rclone lsl {{.RCLONE_REMOTE}}:{{.BUCKET}}/{{.TARGET_PATH}}'


  rev-sync:
    alias: [download]
    internal: true
    desc: "⚠️ 同步远程文件到本地（会删除本地多余文件）"
    cmds:
      - 'rclone sync {{.RCLONE_REMOTE}}:{{.BUCKET}}/{{.REMOTE_PATH}} {{.LOCAL_PATH}} {{.DRY_RUN_FLAG}}'
    vars:
      REMOTE_PATH: "docs"  # 指定远程路径
      BUCKET: ''
      DRY_RUN_FLAG: ''
      LOCAL_PATH: ''
    requires:
      vars: [BUCKET, LOCAL_PATH]


  delete:
    internal: true
    desc: "🔥 删除远程文件夹内容（默认模拟执行）"
    cmds:
      - 'rclone delete {{.RCLONE_REMOTE}}:{{.BUCKET}}/{{.TARGET_PATH}} {{.DRY_RUN_FLAG}}'
    vars:
      TARGET_PATH: "x"  # 需删除的路径
      BUCKET: ''
      DRY_RUN_FLAG: ''
    requires:
      vars: [BUCKET, TARGET_PATH]

  purge:
    internal: true
    desc: "🔥 彻底删除远程文件夹（包括目录本身）"
    cmds:
      - 'rclone purge {{.RCLONE_REMOTE}}:{{.BUCKET}}/{{.TARGET_PATH}} {{.DRY_RUN_FLAG}}'
    vars:
      BUCKET: ''
      DRY_RUN_FLAG: ''
      TARGET_PATH: ''
    requires:
      vars: [BUCKET, TARGET_PATH]


  rmdirs:
    internal: true
    desc: 删除所有空目录
    cmds:
      - 'rclone rmdirs {{.RCLONE_REMOTE}}:{{.BUCKET}}/{{.BASE_PATH}} -v'
    vars:
      BASE_PATH: ''
      BUCKET: ''
    requires:
      vars: [BUCKET]
