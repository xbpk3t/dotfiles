---
version: "3"

vars:
  DROID_SCRIPT: "{{.TASKFILE_DIR}}/droid/droid.nu"
  DROID_APPS_FILE: "{{.TASKFILE_DIR}}/droid/apps.yml"
  DROID_DEBLOAT_FILE: "{{.TASKFILE_DIR}}/droid/debloat.yml"
  DROID_USER: '{{if .USER_ID}}{{.USER_ID}}{{else}}0{{end}}' # 重要：默认只处理主用户 user 0
  DROID_LOG_SINCE: '{{if .SINCE}}{{.SINCE}}{{else}}12h{{end}}'


tasks:
  _ensure:nu:
    internal: true
    preconditions:
      - sh: command -v nu >/dev/null
        msg: nu not found
      - sh: test -f "{{.DROID_SCRIPT}}"
        msg: "{{.DROID_SCRIPT}} not found"
    cmd: true

  _ensure:adb:
    internal: true
    preconditions:
      - sh: command -v adb >/dev/null
        msg: adb not found
    cmd: true

  _ensure:fdroidcl:
    internal: true
    preconditions:
      - sh: command -v fdroidcl >/dev/null
        msg: fdroidcl not found
    cmd: true

  _ensure:apps-file:
    internal: true
    preconditions:
      - sh: test -f "{{.DROID_APPS_FILE}}"
        msg: "{{.DROID_APPS_FILE}} not found"
    cmd: true

  _ensure:debloat-file:
    internal: true
    preconditions:
      - sh: test -f "{{.DROID_DEBLOAT_FILE}}"
        msg: "{{.DROID_DEBLOAT_FILE}} not found"
    cmd: true

  default:
    desc: droid 任务入口
    summary: "task -g droid"
    silent: true
    interactive: true
    cmds:
      - task: '{{.TASK}}'
    vars:
      TASK:
        sh: gum choose apps:check apps:install debloat:check debloat:apply diag:debloat:log diag:debloat:jobs diag:debloat:battery diag:debloat:full
        msg: 选择 mobile 任务

  apps:check:
    desc: 检查 apps.yml 中声明的 app 是否已安装
    summary: "task -g droid:apps:check [USER_ID=0]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:apps-file
      - 'nu "{{.DROID_SCRIPT}}" apps-check --config "{{.DROID_APPS_FILE}}" --user-id "{{.DROID_USER}}"'

  apps:install:
    desc: 安装 apps.yml 中 source=fdroid 的缺失 app
    summary: "task -g droid:apps:install [USER_ID=0]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:fdroidcl
      - task: _ensure:apps-file
      - 'nu "{{.DROID_SCRIPT}}" apps-install --config "{{.DROID_APPS_FILE}}" --user-id "{{.DROID_USER}}"'

  debloat:check:
    desc: 检查 debloat.yml 中声明的预装包当前状态
    summary: "task -g droid:debloat:check [USER_ID=0]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:debloat-file
      - 'nu "{{.DROID_SCRIPT}}" debloat-check --config "{{.DROID_DEBLOAT_FILE}}" --user-id "{{.DROID_USER}}"'

  debloat:apply:
    desc: 执行 debloat.yml 中声明的 debloat 动作
    summary: "task -g droid:debloat:apply [USER_ID=0]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:debloat-file
      - 'nu "{{.DROID_SCRIPT}}" debloat-apply --config "{{.DROID_DEBLOAT_FILE}}" --user-id "{{.DROID_USER}}"'

  diag:debloat:log:
    desc: 基于 debloat.yml 检查近期 logcat 中与被处理包相关的异常信号
    summary: "task -g droid:diag:debloat:log [USER_ID=0] [SINCE=12h]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:debloat-file
      - 'nu "{{.DROID_SCRIPT}}" diag-debloat-log --config "{{.DROID_DEBLOAT_FILE}}" --user-id "{{.DROID_USER}}" --since "{{.DROID_LOG_SINCE}}"'

  diag:debloat:jobs:
    desc: 基于 dumpsys activity/alarm/jobscheduler 检查 debloat 包相关调度与服务痕迹
    summary: "task -g droid:diag:debloat:jobs [USER_ID=0]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:debloat-file
      - 'nu "{{.DROID_SCRIPT}}" diag-debloat-jobs --config "{{.DROID_DEBLOAT_FILE}}" --user-id "{{.DROID_USER}}"'

  diag:debloat:battery:
    desc: 基于 dumpsys batterystats 检查 debloat 包相关电量/唤醒线索
    summary: "task -g droid:diag:debloat:battery [USER_ID=0]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:debloat-file
      - 'nu "{{.DROID_SCRIPT}}" diag-debloat-battery --config "{{.DROID_DEBLOAT_FILE}}" --user-id "{{.DROID_USER}}"'

  diag:debloat:full:
    desc: 汇总执行 debloat 日志、调度、电量诊断
    summary: "task -g droid:diag:debloat:full [USER_ID=0] [SINCE=12h]"
    cmds:
      - task: _ensure:nu
      - task: _ensure:adb
      - task: _ensure:debloat-file
      - 'nu "{{.DROID_SCRIPT}}" diag-debloat-full --config "{{.DROID_DEBLOAT_FILE}}" --user-id "{{.DROID_USER}}" --since "{{.DROID_LOG_SINCE}}"'
