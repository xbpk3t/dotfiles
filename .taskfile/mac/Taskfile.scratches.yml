---
version: '3'

vars:
  SCRATCH_SCRIPT: '{{.TASKFILE_DIR}}/scripts/scratches/run.nu'

tasks:
  default:
    desc: "List/search scratch files and open in Helix (cmux)"
    summary: "task -g scratches"
    silent: true
    interactive: true
    cmds:
      - nu "{{.SCRATCH_SCRIPT}}"

  new:
    desc: "Create a new scratch file and open in Helix (cmux)"
    summary: "task -g scratches:new"
    silent: true
    interactive: true
    cmds:
      - nu "{{.SCRATCH_SCRIPT}}" new

  rename:
    desc: "Rename a scratch file"
    summary: "task -g scratches:rename"
    silent: true
    interactive: true
    cmds:
      - nu "{{.SCRATCH_SCRIPT}}" rename
