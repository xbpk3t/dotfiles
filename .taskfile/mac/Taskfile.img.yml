---
version: "3"


#- url: https://github.com/ImageMagick/ImageMagick
#  des: ImageMagick 用来用cli执行各种图片操作（比如压缩、）

#- 我自己的图片都需要png格式的，但是有很多图片本身是jpg格式的，在网页操作很麻烦，怎么用cli批量操作? # 'find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -exec sh -c 'magick mogrify -format png "{}" && rm "{}"' \;' #  # 注意这里使用的mogrify本身是支持直接替换的，但是如果使用-format就无法替换了，所以后面需要使用rm手动删除
#- magick in.png -resize 50% out.png # 压缩PNG图片


tasks:
  jpg2png:
    desc: jpg-to-png
    summary: "task -g jpg2png"
    dir: '{{.USER_WORKING_DIR}}'
    preconditions:
      - sh: command -v magick
        msg: magick not found
    cmd: find . -type f \( -name "*.jpg" -o -name "*.JPG" -o -name "*.jpeg" \) -exec sh -c 'magick mogrify -format png "{}" && rm "{}"' \;


  png2webp:
    desc: png-to-webp
    summary: "task -g img:png2webp"
    dir: '{{.USER_WORKING_DIR}}'
    preconditions:
      - sh: command -v cwebp
        msg: cwebp not found
    cmds:
      - |
        # 默认使用 lossless；只有生成 webp 成功后才删除原始 PNG。
        find . -type f \( -name "*.png" -o -name "*.PNG" \) -exec sh -c '
          for file do
            out="${file%.*}.webp"

            # 已存在同名 webp 时直接跳过，保证重复执行时更稳。
            if [ -e "$out" ]; then
              printf "skip: %s\n" "$out"
              continue
            fi

            cwebp -lossless "$file" -o "$out" && rm "$file"
          done
        ' sh {} +
