---
version: "3"

tasks:

  # ========================
  # 系统清理与优化
  # ========================
  clean:
    desc: 综合清理（容器/镜像/卷/网络）
    summary: "task -g system-clean"
    cmds:
      - docker system prune -af
      - docker volume prune -f
      - docker network prune -f
      - docker image prune -a -f # 删除悬空镜像


  # ========================
  # 镜像与存储管理
  # ========================
  image-backup:
    desc: 备份具名卷数据
    summary: "task -g image-backup VOLUME=<name>"
    vars:
      VOLUME: ''
    requires:
      vars: [VOLUME]
    cmds:
      - docker run --rm -v {{.VOLUME}}:/data -v $(pwd):/backup alpine tar cvf /backup/backup.tar /data


  # docker 里怎么抓包？ # 三条命令，先docker inspect获取容器id，然后 nsenter进入容器空间，最后用tcpdump抓包指定网卡
  capture:
    desc: 在Docker容器网络命名空间中抓包
    summary: "task -g capture CONTAINER=<name> [TCPDUMP_ARGS=<args>]"
    vars:
      CONTAINER: ''
      TCPDUMP_ARGS: '{{.TCPDUMP_ARGS | default "-i eth0 -w capture.pcap"}}'
      STATE_PID: '{{"{{.State.Pid}}"}}'
    requires:
      vars: [CONTAINER]
    env:
      # 默认抓包参数，可被覆盖
      TCPDUMP_ARGS: '-i eth0 -w capture.pcap'
    cmds:
      # 获取容器PID
      - |
        set -e
        if ! docker inspect "{{.CONTAINER}}" &>/dev/null; then
          echo "错误：容器 '{{.CONTAINER}}' 不存在或未运行"
          exit 1
        fi
        export PID=$(docker inspect -f '{{.STATE_PID}}' "{{.CONTAINER}}")

      # 执行抓包
      - |
        echo "在容器 {{.CONTAINER}} 的网络空间抓包(CTRL+C停止)..."
        echo "参数: {{.TCPDUMP_ARGS}}"
        nsenter -t $PID -n tcpdump {{.TCPDUMP_ARGS}}
    silent: true
    sources:
      # 添加环境文件支持
      - .env
