version: "3"

  # 这个文件是 global Go task 的聚合入口，定位是“通用能力层”，不是具体项目的 Taskfile。
  #
  # 这里应优先放可跨项目复用的 Go 能力，例如：
  # fmt / vet / test / tidy / lint / gosec / swagger / pprof / tools
  #
  # 不要在这里放具体项目的运行时上下文或业务变量，例如：
  # domain / port / cookie / login / client_id / redirect_uri / 某个服务的账号密码
  #
  # 如果是某个 Go 项目自己的开发、运行、联调、容器编排、接口测试任务，
  # 应该放在项目自己的 Taskfile 中；这个 global 层只提供通用能力。
  #
  # 如果后续要设计“项目型”的 Go Taskfile，可参考：
  # https://github.com/alexhokl/auth-server/blob/main/Taskfile.yml
  #
  # 简单说：
  # - 这里解决的是通用 Go 能力复用
# - 项目 Taskfile 解决的是项目上下文与工作流编排

includes:
  core:
    taskfile: ./Taskfile.go.core.yml
    flatten: true
  profile:
    taskfile: ./Taskfile.go.profile.yml
    flatten: true
  docs:
    taskfile: ./Taskfile.go.docs.yml
    flatten: true
  tools:
    taskfile: ./Taskfile.go.tools.yml
    flatten: true
