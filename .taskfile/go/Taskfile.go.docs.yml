version: "3"


tasks:
  swagger:
    desc: Generate code of Swagger 2.0 documentation
    summary: "task -g go:swagger"
    silent: true
    cmds:
      - swag init

  swagger-format:
    desc: Format Swagger comments in Go code
    summary: "task -g go:swagger-format"
    silent: true
    cmds:
      - swag fmt

  swagger-open:
    desc: Open Swagger documentation in a browser
    summary: "task -g go:swagger-open SITE=localhost:8080"
    silent: true
    vars:
      SITE: '{{.SITE}}'
    requires:
      vars: [SITE]
    cmds:
      - cmd: open http://{{.SITE}}/swagger/index.html
        platforms: [darwin, linux]
      - cmd: explorer http://{{.SITE}}/swagger/index.html
        platforms: [windows]
