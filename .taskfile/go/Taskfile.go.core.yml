tasks:
  # Commented out to prevent auto-execution when included
  # default:
  #   dir: '{{.USER_WORKING_DIR}}'
  #   desc: "Run the default go tasks"
  #   cmds:
  #     - task: clean
  #     - task: generate
  #     - task: fmt
  #     - task: vet
  #     - task: tidy
  #     - task: test
  #     - task: lint
  #     - task: gosec

  clean:
    desc: "Clean the go binary"
    summary: "task -g go:clean"
    cmds:
      - echo "Cleaning..."
      - rm -f coverage.*
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  generate:
    desc: "Generate the go code"
    summary: "task -g go:generate"
    cmds:
      - echo "Generating..."
      - go generate ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  vet:
    desc: "Vet the go code"
    summary: "task -g go:vet"
    cmds:
      - echo "Vetting..."
      - go vet ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  fmt:
    desc: "Format the go code"
    summary: "task -g go:fmt"
    cmds:
      - echo "Formatting..."
      - go fmt ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  lint:
    desc: "Lint the go code"
    summary: "task -g go:lint"
    cmds:
      - echo "Linting..."
      - golangci-lint run ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'


  test:
    desc: "Test the go code"
    summary: "task -g go:test"
    cmds:
      - echo "Testing..."
      - go test ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  # [mfridman/tparse: CLI tool for summarizing go test output. Pipe friendly. CI/CD friendly.](https://github.com/mfridman/tparse) 怎么在cicd中可视化测试覆盖率? # CLI tool for summarizing go test output. Pipe friendly. CI/CD friendly.
  # [qiniu/goc: A Comprehensive Coverage Testing System for The Go Programming Language](https://github.com/qiniu/goc) [系统测试中的Go代码覆盖率统计](https://tech.qimao.com/test/)
  test-coverage:
    desc: "Test the go code with coverage"
    summary: "task -g go:test-coverage"
    set: [pipefail]
    cmds:
      - echo "Generating test coverage..."
      - go test -json -covermode=atomic -coverpkg=./... -coverprofile coverage.out ./... | tparse
      #      - go test -v ./... -covermode=atomic -coverpkg=./... -coverprofile coverage.out
      - go tool cover -html coverage.out -o coverage.html
    silent: true
    dir: '{{.USER_WORKING_DIR}}'


  tidy:
    desc: "Tidy the go code"
    summary: "task -g go:tidy"
    cmds:
      - echo "Tidying..."
      - go mod tidy
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  gosec:
    desc: "Run gosec on the go code"
    summary: "task -g go:gosec"
    cmds:
      - echo "Running gosec..."
      - gosec ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'

  update:
    desc: "Update the go dependencies"
    summary: "task -g go:update"
    cmds:
      - echo "Updating dependencies..."
      - go get -u ./...
    silent: true
    dir: '{{.USER_WORKING_DIR}}'


  pre-install:
    desc: "pre install 任务"
    summary: "task -g go:pre-install"
    cmds:
      - go install github.com/dkorunic/betteralign/cmd/@latest
    preconditions:
      - sh: command -v go >/dev/null
        msg: go is not installed
      - sh: test -d "$(go env GOPATH)/bin" # 列出所有go install安装的bin (cli工具)
        msg: "$(go env GOPATH)/bin does not exist"
