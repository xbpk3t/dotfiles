---
# flake 相关任务（跨平台）

version: '3'



tasks:
  rm:
    desc: "用来移除指定flake包"
    summary: "task -g rm"
    interactive: true
    cmds:
      - gum confirm "是否已经在flake.nix移除指定flake包了?"
      - nix flake lock
      - nix flake check --no-build
      - nix flake metadata

  update:
    desc: "更新所有 flake 到最新版本，并查看更新内容"
    summary: "task -g update"
    cmds:
      - nix flake update # nix flake update --flake ./nix
      - nix flake show


  update-input:
    desc: "Update specific flake input (usage: task nix:update-input INPUT=nixpkgs)"
    summary: "task -g update-input INPUT=<name>"
    vars:
      INPUT: ''
    cmds:
      - nix flake lock --update-input "{{.INPUT}}" ./nix
    requires:
      vars: [INPUT]


  check-config:
    internal: true
    desc: "Check nix-darwin configuration syntax"
    cmds:
      - echo "🔍 Checking configuration syntax..."
      - nix flake check .
      - echo "✅ Configuration syntax is valid"
