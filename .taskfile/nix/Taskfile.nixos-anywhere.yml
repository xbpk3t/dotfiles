---
version: '3'

# nixos-anywhere 远程刷机
#
# 逻辑委托给同目录 scripts/nixos-anywhere.nu（Nushell），
# Taskfile 仅做变量传参和 precondition 前置拦截。
#
# 用法:
#   tgg nix:nixos-anywhere FLAKE="path#host" HOST="root@ip"
#   tgg nix:nixos-anywhere FLAKE="path#host" HOST="root@ip" DRY_RUN=false


vars:
  NA_SCRIPT: "{{.TASKFILE_DIR}}/scripts/nixos-anywhere.nu"


tasks:
  default:
    desc: nixos-anywhere 远程刷机（默认 dry-run，加 DRY_RUN=false 执行）
    summary: "t nix:nixos-anywhere FLAKE=... HOST=... [DRY_RUN=false]"
    vars:
      FLAKE: '{{.FLAKE | default ""}}'
      HOST: '{{.HOST | default ""}}'
      # Why 不加 --no-reboot：ssh public key 已写入 NixOS config，
      # 刷机后直接 reboot 即可 key auth 登录，无需手动传 key。
      NA_ARGS: '{{.NA_ARGS | default "--debug"}}'
      # DRY_RUN="false" → --execute 传给 Nushell 脚本
      _EXECUTE: '{{if eq .DRY_RUN "false"}}--execute{{end}}'
    cmds:
      - cmd: >
          nu "{{.NA_SCRIPT}}"
          --flake '{{.FLAKE}}'
          --host '{{.HOST}}'
          --na-args='{{.NA_ARGS}}'
          {{._EXECUTE}}
    preconditions:
      - sh: command -v nu
        msg: "需要 nushell（brew install nushell / nix shell nixpkgs#nushell）"
