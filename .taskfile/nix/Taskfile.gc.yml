---
version: '3'

tasks:
  default:
    desc: "执行清理：store GC + 裁剪 30d 前的 generations"
    summary: "task nix:gc"
    cmds:
      - echo "[pre-cleanup:du] $(du -sh /nix/store | cut -f1)"
      - echo "[nix:gc] cleaning generations older than 30d..."
      - nix-collect-garbage --delete-older-than 30d
      - echo "[nix:gc] complete"
      - echo "[usage] $(du -sh /nix/store | cut -f1)"
