data_dir = ""
attachment_send = "on"
language = "zh"
idle_timeout_mins = 120

[[projects]]
name = "docs"

[projects.agent]
type = "claudecode"
provider_refs = ["docs-provider"]

[projects.agent.options]
work_dir = "/home/luck/Desktop/docs"
mode = "default"

[[projects.platforms]]
type = "feishu"

[projects.platforms.options]
app_id = ""
app_secret = ""

[[projects.agent.providers]]
name = "docs-provider"
api_key = "${ANTHROPIC_AUTH_TOKEN}"
base_url = "https://api.lucc.dev/"
model = "deepseek-v4-flash"
env = { ANTHROPIC_AUTH_TOKEN = "${ANTHROPIC_AUTH_TOKEN}", ANTHROPIC_BASE_URL = "${ANTHROPIC_BASE_URL}" }

[log]
level = "info"

[speech]
enabled = false
provider = ""
language = ""

[speech.openai]
api_key = ""
base_url = ""
model = ""

[speech.groq]
api_key = ""
base_url = ""
model = ""

[speech.qwen]
api_key = ""
base_url = ""
model = ""

[speech.gemini]
api_key = ""
model = ""

[tts]
enabled = false
provider = ""
voice = ""
tts_mode = ""
max_text_len = 0

[tts.openai]
api_key = ""
base_url = ""
model = ""

[tts.qwen]
api_key = ""
base_url = ""
model = ""

[tts.minimax]
api_key = ""
base_url = ""
model = ""

[display]
thinking_messages = true
thinking_max_len = 300
tool_max_len = 500
tool_messages = true

[stream_preview]
enabled = true
interval_ms = 1500

[rate_limit]
max_messages = 20
window_secs = 60

[cron]
session_mode = ""

[webhook]
port = 0

[bridge]
enabled = true
port = 9810
token = "${DEFAULT_SK}"
cors_origins = ["*"]

[management]
enabled = true
port = 9820
token = "${DEFAULT_SK}"
cors_origins = ["*"]
