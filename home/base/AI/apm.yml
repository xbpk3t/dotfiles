# APM global skill manifest — managed by Nix (home.file)
# Run `apm install -g` after rebuild to sync dependencies.
# ~/.apm/apm.lock is APM's runtime artifact; not managed here.

name: apm-global
version: 0.1.0
description: Global APM skill manifest for cross-project agent capabilities
author: luck
license: MIT

targets:
  - claude
  - codex

includes: auto

dependencies:
  apm:

    - git: https://github.com/jackwener/opencli.git
    # Provides
    # Run `npx skills add jackwener/opencli` to install after apm sync
      skills:
        - opencli-usage # 命令快速参考，用来插命令
        - opencli-browser # opencli browser 命令（驱动chrome做交互式操作）

  claude:
    - git: https://github.com/joa23/linear-cli.git
      path: .claude/skills
      skills:
        - deps
        - triage
        - cycle-plan
