version: 1

# Diagram defaults and selection reasons (manual)

diagram_defaults:
  flowchart:
    default: mermaid
    reason: "Fast authoring with wide support and simple syntax."

  sequence:
    default: mermaid
    reason: "Concise syntax and easy-to-read sequence output."

  class:
    default: mermaid
    reason: "Readable class diagrams with minimal boilerplate."

  state:
    default: mermaid
    reason: "Compact syntax and stable rendering."

  gantt:
    default: mermaid
    reason: "Native gantt support with simple task formatting."

  timeline:
    default: mermaid
    reason: "Built-in timeline syntax and consistent output."

  mindmap:
    default: plantuml
    reason: "Mermaid mindmap不符合需求，D2布局有问题，PlantUML更稳定。"

  er:
    default: mermaid
    reason: "ER diagram syntax is concise and easy to maintain."

  architecture:
    default: d2
    reason: "Strong spatial layout for architecture-style diagrams."

  network:
    default: d2
    reason: "Good layout control for network-style graphs."

  pie:
    default: mermaid
    reason: "Simple pie syntax with reliable rendering."

  journey:
    default: mermaid
    reason: "Native journey diagram support."

  gitgraph:
    default: mermaid
    reason: "Purpose-built gitgraph syntax."

  table:
    default: typst
    reason: "Typst和D2都能画表格，但Typst布局更稳定。"
